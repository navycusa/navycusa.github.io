<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — US Navy CUSA Portal</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/jpg" href="/assets/navy.jpg">
  <link rel="apple-touch-icon" href="/assets/navy.jpg">
</head>
<body>

<div class="login-page">
  <div class="login-card" style="max-width:440px">

    <div class="login-header">
      <div class="login-seal"><img src="/assets/navy.jpg" alt="US Navy logo"></div>
      <h1>Set New Password</h1>
      <p>Welcome, <strong id="welcome-name">—</strong>.</p>
      <div class="login-divider"></div>
    </div>

    <div class="alert alert-info" style="margin-bottom:18px">
      <div>
        <strong>Action Required</strong><br>
        Your account was created with a temporary password.
        You must set a new password before accessing the portal.
      </div>
    </div>

    <div id="cp-alert" class="alert hidden"></div>

    <form id="cp-form" autocomplete="off" novalidate>
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input
          type="password" id="new-password" name="new-password"
          class="form-control" placeholder="Minimum 8 characters"
          autocomplete="new-password" required minlength="8"
        >
        <div class="form-text">Must be at least 8 characters.</div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm New Password</label>
        <input
          type="password" id="confirm-password" name="confirm-password"
          class="form-control" placeholder="Repeat your new password"
          autocomplete="new-password" required
        >
      </div>

      <button type="submit" id="cp-btn" class="btn btn-primary btn-block btn-lg" style="margin-top:8px">
        Update Password
      </button>
    </form>

    <p style="text-align:center;margin-top:18px;font-size:0.72rem;color:var(--text-muted)">
      <span style="opacity:.9">created by pPayday</span>
    </p>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<script src="/js/ranks.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/change-password.js"></script>
</body>
</html>
