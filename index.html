<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — US Navy CUSA Portal</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-header">
      <div class="login-seal">⚓</div>
      <h1>US Navy CUSA</h1>
      <p>Personnel Management Portal</p>
      <div class="login-divider"></div>
      <p style="font-size:0.72rem;letter-spacing:0.04em;text-transform:uppercase;color:var(--text-muted)">
        Authorized Personnel Only
      </p>
    </div>

    <div id="login-alert" class="alert hidden"></div>

    <form id="login-form" autocomplete="off" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text" id="username" name="username"
          class="form-control" placeholder="Enter your username"
          autocomplete="username" required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password" id="password" name="password"
          class="form-control" placeholder="Enter your password"
          autocomplete="current-password" required
        >
      </div>

      <button type="submit" id="login-btn" class="btn btn-primary btn-block btn-lg" style="margin-top:8px">
        Sign In
      </button>
    </form>

    <p style="text-align:center;margin-top:18px;font-size:0.72rem;color:var(--text-muted)">
      Contact your commanding officer if you need access.
    </p>

  </div>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<script src="/js/ranks.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
